<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Reader v1.2</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>News Reader</h1>
    </header>

    <main class="workspace">
      <aside class="left-nav">
        <h2>集合入口</h2>
        <button id="navFeedBtn" class="nav-btn active">新闻流</button>
        <button id="navImportantBtn" class="nav-btn">重要新闻</button>
        <button id="navReadLaterBtn" class="nav-btn">稍后再看</button>

        <h2 class="sources-title">订阅源</h2>
        <div id="sourceFilters" class="source-filters"></div>
      </aside>

      <section class="feed-column">
        <div class="controls feed-controls">
          <button id="resumeAnchorBtn" class="icon-btn hidden" type="button"></button>
          <button id="readFilterToggleBtn" class="icon-btn" type="button"></button>
          <button id="markAllReadBtn" class="icon-btn" type="button"></button>
          <button id="refreshBtn" class="icon-btn" type="button"></button>
        </div>
        <div id="meta" class="meta"></div>
        <ul id="newsList" class="news-list">
          <li id="listHint" class="list-hint"></li>
          <li id="loadMoreSentinel" class="load-sentinel" aria-hidden="true"></li>
        </ul>
        <div class="pager hidden" aria-hidden="true">
          <span id="pageInfo">1 / 1</span>
        </div>
        <div id="endBuffer" class="end-buffer hidden" aria-hidden="true">
          <span>已到列表末尾</span>
        </div>
      </section>

      <aside id="detailPanel" class="detail-panel" aria-live="polite">
        <button id="detailCloseBtn" class="detail-close" type="button">关闭</button>
        <div id="detailEmpty" class="detail-empty">选择一条新闻查看摘要与正文</div>
        <div id="detailBody" class="detail-body hidden">
          <h3 id="detailTitle" class="detail-title"></h3>
          <div id="detailMeta" class="detail-meta"></div>
          <div class="detail-actions">
            <a id="detailLink" class="detail-link" href="#" target="_blank" rel="noopener noreferrer">打开原文</a>
            <button id="detailRetryBtn" class="detail-retry-btn hidden" type="button">重试详情抓取</button>
            <button id="detailRetranslateBtn" class="detail-retry-btn hidden" type="button">重新翻译</button>
            <button id="detailImportantBtn" class="icon-btn" type="button"></button>
          </div>
          <div class="detail-scroll-area">
            <div id="detailSummary" class="detail-summary"></div>
            <section id="detailAiBox" class="detail-ai-box hidden">
              <h4>中文要点</h4>
              <ul id="detailAiPoints" class="detail-ai-points"></ul>
              <p id="detailAiConclusion" class="detail-ai-conclusion"></p>
            </section>
            <div id="detailStatus" class="detail-status"></div>
            <div id="detailContent" class="detail-content hidden"></div>
            <details id="detailOriginalWrap" class="detail-original hidden">
              <summary>查看英文原文</summary>
              <div id="detailOriginalContent" class="detail-original-content"></div>
            </details>
          </div>
        </div>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
