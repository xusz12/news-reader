<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Reader v1.2</title>
    <link rel="stylesheet" href="/static/style.css?v=1.8.3.1c" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <h1>News Reader</h1>
        <p class="topbar-subtitle">如果是牛市，那么永远不缺机会。</p>
      </div>
      <div class="topbar-search" role="search">
        <input id="globalSearchInput" class="topbar-search-input" type="search" placeholder="搜索标题、原文、AI、想法、板块..." aria-label="全局全文搜索" />
        <button id="globalSearchBtn" class="topbar-search-btn" type="button">搜索</button>
        <button id="globalSearchClearBtn" class="topbar-search-clear hidden" type="button">关闭</button>
      </div>
      <div class="topbar-prefs">
        <div class="topbar-bell-wrap">
          <button id="errorStatsBtn" class="icon-btn" type="button" title="查看当日错误统计" aria-label="查看当日错误统计"></button>
          <section id="errorStatsPanel" class="error-stats-panel hidden" aria-live="polite">
            <div class="error-stats-header">当日错误统计</div>
            <div id="errorStatsBody" class="error-stats-body"></div>
          </section>
        </div>
        <label class="pref-label" for="themeModeSelect">外观</label>
        <select id="themeModeSelect" class="pref-select">
          <option value="system">跟随系统</option>
          <option value="light">浅色</option>
          <option value="dark">深色</option>
        </select>
        <label class="pref-label" for="detailFontSelect">右栏字体</label>
        <select id="detailFontSelect" class="pref-select">
          <option value="medium">中</option>
          <option value="small">小</option>
          <option value="large">大</option>
        </select>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <aside class="left-nav">
        <h2>集合入口</h2>
        <button id="navFeedBtn" class="nav-btn active">新闻流</button>
        <button id="navImportantBtn" class="nav-btn">重要新闻</button>
        <button id="navReadLaterBtn" class="nav-btn">稍后再看</button>
        <button id="navNotesBtn" class="nav-btn">想法</button>
        <button id="navMarketTagsBtn" class="nav-btn">板块</button>
        <button id="navTrendsBtn" class="nav-btn">趋势</button>

        <h2 class="sources-title">订阅源</h2>
        <div id="sourceFilters" class="source-filters"></div>
      </aside>

      <section class="feed-column">
        <div class="controls feed-controls">
          <button id="resumeAnchorBtn" class="icon-btn hidden" type="button"></button>
          <button id="readFilterToggleBtn" class="icon-btn" type="button"></button>
          <button id="markAllReadBtn" class="icon-btn" type="button"></button>
          <button id="refreshBtn" class="icon-btn" type="button"></button>
          <button id="manageMarketTagsBtn" class="icon-btn hidden" type="button" title="管理板块" aria-label="管理板块"></button>
        </div>
        <div id="meta" class="meta"></div>
        <ul id="newsList" class="news-list">
          <li id="listHint" class="list-hint"></li>
          <li id="loadMoreSentinel" class="load-sentinel" aria-hidden="true"></li>
        </ul>
        <div id="trendsView" class="trends-view hidden">
          <div class="trends-scroll">
            <table id="trendsTable" class="trends-table"></table>
          </div>
        </div>
        <div class="pager hidden" aria-hidden="true">
          <span id="pageInfo">1 / 1</span>
        </div>
      </section>

      <aside id="detailPanel" class="detail-panel" aria-live="polite">
        <button id="detailCloseBtn" class="detail-close" type="button">关闭</button>
        <div id="detailEmpty" class="detail-empty">选择一条新闻查看摘要与正文</div>
        <div id="detailTrendBody" class="detail-trend-body hidden">
          <h3 id="detailTrendTitle" class="detail-title"></h3>
          <div id="detailTrendMeta" class="detail-meta"></div>
          <div class="detail-actions detail-trend-actions">
            <button id="trendComposeBtn" class="detail-retry-btn" type="button">写趋势想法</button>
            <button id="trendBullishNoteBtn" class="detail-retry-btn" type="button">写看多想法</button>
            <button id="trendBearishNoteBtn" class="detail-retry-btn" type="button">写看空想法</button>
          </div>
          <section id="detailTrendNoteCard" class="detail-note-card hidden">
            <h4 id="detailTrendNoteTitle">趋势想法</h4>
            <p id="detailTrendNoteText" class="detail-note-text"></p>
          </section>
          <section id="detailTrendNoteEditor" class="detail-note-editor hidden">
            <div id="detailTrendNoteEditorMeta" class="detail-meta"></div>
            <textarea id="detailTrendNoteInput" class="detail-note-input" rows="4" maxlength="5000" placeholder="记录你对这个日期、板块与方向的判断..."></textarea>
            <div class="detail-note-actions">
              <button id="detailTrendNoteSaveBtn" class="detail-retry-btn" type="button">保存</button>
              <button id="detailTrendNoteDeleteBtn" class="detail-retry-btn" type="button">删除</button>
              <button id="detailTrendNoteCancelBtn" class="detail-retry-btn" type="button">取消</button>
            </div>
          </section>
          <div id="detailTrendList" class="detail-trend-list"></div>
        </div>
        <div id="detailTrendComposerBody" class="detail-tag-admin-body hidden">
          <div class="detail-tag-admin-header">
            <div>
              <h3 class="detail-title">写趋势想法</h3>
              <div class="detail-meta">手动添加板块看多/看空信号与想法</div>
            </div>
          </div>
          <section class="detail-tag-create detail-trend-compose">
            <select id="trendNoteDateSelect" class="pref-select"></select>
            <select id="trendNoteTagSelect" class="pref-select"></select>
            <select id="trendNoteDirectionSelect" class="pref-select">
              <option value="bullish">看多</option>
              <option value="bearish">看空</option>
            </select>
          </section>
          <section class="detail-note-editor">
            <textarea id="trendNoteComposeInput" class="detail-note-input" rows="5" maxlength="5000" placeholder="记录你对这个趋势单元格的判断..."></textarea>
            <div class="detail-note-actions">
              <button id="trendNoteComposeSaveBtn" class="detail-retry-btn" type="button">保存</button>
              <button id="trendNoteComposeDeleteBtn" class="detail-retry-btn" type="button">删除</button>
              <button id="trendNoteComposeCancelBtn" class="detail-retry-btn" type="button">取消</button>
            </div>
          </section>
        </div>
        <div id="detailTagAdminBody" class="detail-tag-admin-body hidden">
          <div class="detail-tag-admin-header">
            <div>
              <h3 class="detail-title">管理板块</h3>
              <div class="detail-meta">新增、重命名或停用板块标签</div>
            </div>
          </div>
          <section class="detail-tag-create">
            <input id="detailTagCreateInput" class="detail-tag-create-input" type="text" maxlength="40" placeholder="新增板块名称" />
            <button id="detailTagCreateBtn" class="detail-retry-btn" type="button">新增</button>
          </section>
          <div id="detailTagAdminList" class="detail-tag-admin-list"></div>
        </div>
        <div id="detailBody" class="detail-body hidden">
          <button id="detailReturnToTrendBtn" class="detail-return-btn hidden" type="button">返回趋势明细</button>
          <h3 id="detailTitle" class="detail-title"></h3>
          <div id="detailInlineMarketTags" class="detail-inline-market-tags hidden"></div>
          <div id="detailMeta" class="detail-meta"></div>
          <div class="detail-actions">
            <a id="detailLink" class="detail-link" href="#" target="_blank" rel="noopener noreferrer">打开原文</a>
            <button id="detailRetryBtn" class="detail-retry-btn hidden" type="button">重试详情抓取</button>
            <button id="detailRetranslateBtn" class="detail-retry-btn hidden" type="button">重新翻译</button>
            <span class="detail-action-spacer" aria-hidden="true"></span>
            <button id="detailNoteToggleBtn" class="icon-btn" type="button" title="写想法" aria-label="写想法"></button>
            <button id="detailBullishBtn" class="icon-btn" type="button" title="看多板块标记" aria-label="看多板块标记"></button>
            <button id="detailBearishBtn" class="icon-btn" type="button" title="看空板块标记" aria-label="看空板块标记"></button>
            <button id="detailImportantBtn" class="icon-btn" type="button"></button>
          </div>
          <section id="detailMarketPicker" class="detail-market-picker hidden">
            <div id="detailMarketPickerTitle" class="detail-market-picker-title">选择板块</div>
            <div id="detailMarketPickerOptions" class="detail-market-picker-options"></div>
          </section>
          <section id="detailNoteEditor" class="detail-note-editor hidden">
            <div class="detail-note-editor-title">记录想法</div>
            <textarea id="detailNoteInput" class="detail-note-input" rows="4" maxlength="5000" placeholder="记录你对这条新闻的看法、判断或后续行动..."></textarea>
            <div class="detail-note-actions">
              <button id="detailNoteSaveBtn" class="detail-retry-btn" type="button">保存</button>
              <button id="detailNoteCancelBtn" class="detail-retry-btn" type="button">取消</button>
            </div>
          </section>
          <div class="detail-scroll-area">
            <section id="detailNoteCard" class="detail-note-card hidden">
              <h4>我的想法</h4>
              <p id="detailNoteText" class="detail-note-text"></p>
            </section>
            <div id="detailSummary" class="detail-summary"></div>
            <section id="detailAiBox" class="detail-ai-box hidden">
              <h4>中文要点</h4>
              <ul id="detailAiPoints" class="detail-ai-points"></ul>
              <p id="detailAiConclusion" class="detail-ai-conclusion"></p>
            </section>
            <div id="detailStatus" class="detail-status"></div>
            <div id="detailContent" class="detail-content hidden"></div>
            <details id="detailOriginalWrap" class="detail-original hidden">
              <summary>查看英文原文</summary>
              <div id="detailOriginalContent" class="detail-original-content"></div>
            </details>
          </div>
        </div>
      </aside>
    </main>

    <div id="mobileFilterSheet" class="mobile-filter-sheet hidden" aria-hidden="true">
      <button id="mobileFilterBackdrop" class="mobile-filter-backdrop" type="button" aria-label="关闭筛选面板"></button>
      <section class="mobile-filter-panel" aria-label="筛选与来源">
        <div class="mobile-filter-header">
          <h3>筛选与来源</h3>
          <button id="mobileFilterCloseBtn" class="mobile-filter-close" type="button">完成</button>
        </div>
        <div id="mobileFilterCollection" class="mobile-filter-collection"></div>
        <div class="mobile-filter-block">
          <h4>来源</h4>
          <div id="mobileSourceFilters" class="mobile-source-filters"></div>
        </div>
      </section>
    </div>

    <div id="mobileCollectionSheet" class="mobile-filter-sheet hidden" aria-hidden="true">
      <button id="mobileCollectionBackdrop" class="mobile-filter-backdrop" type="button" aria-label="关闭集合面板"></button>
      <section class="mobile-filter-panel" aria-label="集合选择">
        <div class="mobile-filter-header">
          <h3>选择集合</h3>
          <button id="mobileCollectionCloseBtn" class="mobile-filter-close" type="button">完成</button>
        </div>
        <div class="mobile-filter-block">
          <div id="mobileCollectionOptions" class="mobile-source-filters"></div>
        </div>
      </section>
    </div>

    <nav class="mobile-collection-tabs" aria-label="集合切换">
      <button id="mobileCollectionTriggerBtn" class="mobile-tab active" type="button">新闻流</button>
      <button id="mobileTabFilterBtn" class="mobile-tab mobile-filter-tab" type="button">新闻源</button>
      <button id="mobileTrendsTabBtn" class="mobile-tab" type="button">趋势</button>
    </nav>

    <script src="/static/app.js?v=1.8.3.1c"></script>
  </body>
</html>
